    <script>
      const spec = {"openapi": "3.0.3", "info": {"title": "Monitoring API", "description": "API for retrieving availability, uptime metrics and status timelines for monitored items.\n", "version": "1.0.0"}, "servers": [{"url": "https://api.example.com"}], "tags": [{"name": "metrics", "description": "Availability and uptime results"}, {"name": "status", "description": "Current and historical status (state) of monitored items"}], "paths": {"/monitoring/metrics": {"get": {"tags": ["metrics"], "summary": "List metrics across multiple items", "description": "Returns metrics for all items, or for a filtered subset via `item` and/or `search`. Supports either a single `date` or a `start-date`/`end-date` range (mutually exclusive). `granularity` and `metric` apply only to this route.\n", "parameters": [{"$ref": "#/components/parameters/ItemFilter"}, {"$ref": "#/components/parameters/SearchFilter"}, {"$ref": "#/components/parameters/Date"}, {"$ref": "#/components/parameters/StartDate"}, {"$ref": "#/components/parameters/EndDate"}, {"$ref": "#/components/parameters/Granularity"}, {"$ref": "#/components/parameters/MetricFilter"}], "responses": {"200": {"description": "Metrics results", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/MetricsResponse"}}}}, "400": {"$ref": "#/components/responses/BadRequest"}}}}, "/monitoring/metrics/{item}": {"get": {"tags": ["metrics"], "summary": "Get metrics for a single item", "description": "Shorthand for `/monitoring/metrics?item={item}`. Supports either a single `date` or a `start-date`/`end-date` range (mutually exclusive, not both). `granularity` applies only to range queries.\n", "parameters": [{"$ref": "#/components/parameters/ItemPath"}, {"$ref": "#/components/parameters/Date"}, {"$ref": "#/components/parameters/StartDate"}, {"$ref": "#/components/parameters/EndDate"}, {"$ref": "#/components/parameters/Granularity"}, {"$ref": "#/components/parameters/MetricFilter"}], "responses": {"200": {"description": "Metrics results for the item", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/MetricsResponse"}}}}, "400": {"$ref": "#/components/responses/BadRequest"}, "404": {"$ref": "#/components/responses/NotFound"}}}}, "/monitoring/status": {"get": {"tags": ["status"], "summary": "List status across multiple items", "description": "Returns current status for all items, or a filtered subset via `item` and/or `search`. Supplying `start-date`/`end-date` returns the status timeline over that range instead of the current state. `granularity` and `metric` do not apply to this route.\n", "parameters": [{"$ref": "#/components/parameters/ItemFilter"}, {"$ref": "#/components/parameters/SearchFilter"}, {"$ref": "#/components/parameters/Date"}, {"$ref": "#/components/parameters/StartDate"}, {"$ref": "#/components/parameters/EndDate"}], "responses": {"200": {"description": "Status results", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/StatusResponse"}}}}, "400": {"$ref": "#/components/responses/BadRequest"}}}}, "/monitoring/status/{item}": {"get": {"tags": ["status"], "summary": "Get status for a single item", "description": "Shorthand for `/monitoring/status?item={item}`. With no date params, returns the current state (one result). With `start-date`/`end-date`, returns the status timeline over that range (multiple results). `granularity` and `metric` do not apply.\n", "parameters": [{"$ref": "#/components/parameters/ItemPath"}, {"$ref": "#/components/parameters/Date"}, {"$ref": "#/components/parameters/StartDate"}, {"$ref": "#/components/parameters/EndDate"}], "responses": {"200": {"description": "Status results for the item", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/StatusResponse"}}}}, "400": {"$ref": "#/components/responses/BadRequest"}, "404": {"$ref": "#/components/responses/NotFound"}}}}}, "components": {"parameters": {"ItemPath": {"name": "item", "in": "path", "required": true, "description": "Identifier of the monitored item.", "schema": {"type": "string"}, "example": "service-a"}, "ItemFilter": {"name": "item", "in": "query", "required": false, "description": "Filter to one or more specific items by exact identifier. Repeat the parameter for multiple items.\n", "style": "form", "explode": true, "schema": {"type": "array", "items": {"type": "string"}}, "example": ["service-a", "service-b"]}, "SearchFilter": {"name": "search", "in": "query", "required": false, "description": "Substring match on item name (fuzzy search, not exact).", "schema": {"type": "string"}, "example": "catalogue"}, "Date": {"name": "date", "in": "query", "required": false, "description": "A single date to query. Mutually exclusive with `start-date` / `end-date`.\n", "schema": {"type": "string", "format": "date"}, "example": "2026-06-01"}, "StartDate": {"name": "start-date", "in": "query", "required": false, "description": "Start of a date range. Must be supplied together with `end-date`. Mutually exclusive with `date`.\n", "schema": {"type": "string", "format": "date"}, "example": "2026-06-01"}, "EndDate": {"name": "end-date", "in": "query", "required": false, "description": "End of a date range. Must be supplied together with `start-date`. Mutually exclusive with `date`.\n", "schema": {"type": "string", "format": "date"}, "example": "2026-06-30"}, "Granularity": {"name": "granularity", "in": "query", "required": false, "description": "Aggregation interval for range queries. Applies only to `/monitoring/metrics` routes; not supported on `/monitoring/status`.\n", "schema": {"type": "string", "enum": ["daily", "monthly"]}}, "MetricFilter": {"name": "metric", "in": "query", "required": false, "description": "Filter to one or more metric types. Repeat the parameter for multiple types. Omit to receive all metric types. Applies only to `/monitoring/metrics` routes.\n", "style": "form", "explode": true, "schema": {"type": "array", "items": {"type": "string", "enum": ["availability", "uptime"]}}, "example": ["availability", "uptime"]}}, "schemas": {"MetricsResponse": {"type": "object", "properties": {"data": {"type": "array", "items": {"$ref": "#/components/schemas/ItemMetrics"}}}}, "ItemMetrics": {"type": "object", "properties": {"item": {"type": "string", "description": "Item identifier.", "example": "service-a"}, "name": {"type": "string", "description": "Human-readable item name.", "example": "Service A"}, "results": {"type": "array", "items": {"$ref": "#/components/schemas/MetricResult"}}}}, "MetricResult": {"type": "object", "properties": {"date": {"type": "string", "format": "date", "example": "2026-07-02"}, "availability": {"type": "number", "format": "double", "description": "Percentage, 0-100 scale.", "example": 100}, "uptime": {"type": "number", "format": "double", "description": "Percentage, 0-100 scale.", "example": 97.5}}}, "StatusResponse": {"type": "object", "properties": {"data": {"type": "array", "items": {"$ref": "#/components/schemas/ItemStatus"}}}}, "ItemStatus": {"type": "object", "properties": {"item": {"type": "string", "description": "Item identifier.", "example": "service-a"}, "name": {"type": "string", "description": "Human-readable item name.", "example": "Service A"}, "results": {"type": "array", "description": "A single entry when no date range is given (current state), or multiple entries ordered by timestamp when `start-date`/ `end-date` is given (status timeline).\n", "items": {"$ref": "#/components/schemas/StatusResult"}}}}, "StatusResult": {"type": "object", "properties": {"timestamp": {"type": "string", "format": "date-time", "example": "2026-07-02T06:49:32Z"}, "state": {"type": "string", "enum": ["OK", "DEGRADED", "DOWN", "UNKNOWN"], "example": "OK"}}}, "Error": {"type": "object", "properties": {"message": {"type": "string"}, "code": {"type": "string"}}}}, "responses": {"BadRequest": {"description": "Invalid parameter combination (e.g. both `date` and `start-date` supplied, or `start-date` without `end-date`).\n", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/Error"}}}}, "NotFound": {"description": "Item not found.", "content": {"application/json": {"schema": {"$ref": "#/components/schemas/Error"}}}}}}};
      Redoc.init(spec, {}, document.getElementById('redoc-container'));
    </script>
